title: Script Notes
description: 使ったことのあるスクリプトを整理して公開する個人サイト
lang: ja
timezone: Asia/Tokyo
url: "https://Mr-129.github.io"
baseurl: "/homepage"
markdown: kramdown
permalink: pretty
author: Mr-129
theme_stylesheet: /assets/css/themes/copper-file.css

collections:
  scripts:
    output: true
    permalink: /scripts/:path/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
  - scope:
      path: ""
      type: "scripts"
    values:
      layout: script

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - README.md
  - templates/
  - docs/
  - draft-private/
