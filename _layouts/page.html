---
layout: default
---
<section class="shell page-section">
  <header class="section-header">
    <p class="eyebrow">Page</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="section-lead">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="content-card prose">
    {{ content }}
  </div>
</section>
